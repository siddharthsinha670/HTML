<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Planner</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 20px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        margin-bottom: 15px;
    }

    .input-section {
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 12px;
        background: #4e73df;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 15px;
    }

    li {
        margin-top: 8px;
        padding: 8px;
        background: #f8f9fc;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 6px;
    }

    .delete-btn {
        background: #e74a3b;
        padding: 4px 8px;
        font-size: 12px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Daily Planner</h1>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    // Load tasks when page opens
    document.addEventListener("DOMContentLoaded", loadTasks);

    function addTask() {
        const input = document.getElementById("taskInput");
        const taskText = input.value.trim();
        if (taskText === "") return;

        createTaskElement(taskText);
        saveTask(taskText);

        input.value = "";
    }

    function createTaskElement(taskText) {
        const li = document.createElement("li");
        li.innerHTML = `
            ${taskText}
            <button class="delete-btn" onclick="deleteTask(this, '${taskText}')">X</button>
        `;
        document.getElementById("taskList").appendChild(li);
    }

    function deleteTask(button, taskText) {
        button.parentElement.remove();
        removeTask(taskText);
    }

    // Storage Logic (acts like backend)
    function saveTask(task) {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        tasks.push(task);
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        tasks.forEach(task => createTaskElement(task));
    }

    function removeTask(taskToDelete) {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        tasks = tasks.filter(task => task !== taskToDelete);
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }
</script>

</body>
</html>
